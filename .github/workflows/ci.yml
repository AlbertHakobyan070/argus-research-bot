name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch on a new push.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install project + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Run hermetic tests
        env:
          PYTHONNOUSERSITE: '1'
        run: |
          # Integration tests that need a live FreeLLMAPI proxy or a
          # Windows-only file path are excluded here — they're
          # exercised locally on the dev box where those are available.
          # Manual end-to-end and the full e2e_research harness are
          # excluded for the same reason.
          python -m pytest tests/ \
            --ignore=tests/manual_e2e.py \
            --ignore=tests/test_e2e_research.py \
            --ignore=tests/test_llm.py \
            --ignore=tests/test_graph.py \
            --ignore=tests/test_reflexion.py \
            --ignore=tests/test_post_synthesis.py \
            --ignore=tests/test_config_tools.py \
            -v --tb=short
